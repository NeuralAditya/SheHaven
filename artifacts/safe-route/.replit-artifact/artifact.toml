kind = "web"
previewPath = "/"
title = "Women Safety Smart Route App"
version = "1.0.0"
id = "artifacts/safe-route"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22022

[services.development]
run = "pnpm --filter @workspace/safe-route run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/safe-route", "run", "build" ]
publicDir = "artifacts/safe-route/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22022"
BASE_PATH = "/"
